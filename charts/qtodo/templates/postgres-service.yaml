apiVersion: v1
kind: Service
metadata:
  name: {{ include "qtodo.postgresql.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qtodo.postgresqlLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.postgresql.service.port }}
      targetPort: {{ .Values.postgresql.service.targetPort }}
      protocol: TCP
      name: postgresql
  selector:
    {{- include "qtodo.postgresqlSelectorLabels" . | nindent 4 }}
