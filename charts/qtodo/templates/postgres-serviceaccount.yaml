{{- if .Values.serviceAccount.postgresql.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "qtodo.postgresqlServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qtodo.postgresqlLabels" . | nindent 4 }}
  {{- with .Values.serviceAccount.postgresql.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
